{{define "content"}}
<h1>Dashboard</h1>
<div class="cards">
  <article class="card"><span>Total backends</span><strong>{{.Total}}</strong></article>
  <article class="card"><span>Enabled backends</span><strong>{{.Enabled}}</strong></article>
  <article class="card"><span>Nginx</span><strong>{{if .Nginx}}Online{{else}}Offline{{end}}</strong></article>
</div>
<section class="panel">
  <h2>Quick start</h2>
  <p>Add your backend VLESS/WebSocket routes, select IP or Domain mode in Settings, preview the Nginx configuration, then apply it.</p>
</section>
{{end}}
