{{define "content"}}
<h1>Edit backend</h1>
<section class="panel">
<form method="post" action="/backends/{{.Backend.ID}}/edit" class="form-grid">
  <label>Name<input name="name" value="{{.Backend.Name}}" required></label>
  <label>Country<input name="country" value="{{.Backend.Country}}" required></label>
  <label>Backend IP<input name="ip" value="{{.Backend.IP}}" required></label>
  <label>Port<input name="port" type="number" min="1" max="65535" value="{{.Backend.Port}}" required></label>
  <label>WebSocket path<input name="path" value="{{.Backend.Path}}" required></label>
  <label class="check"><input name="enabled" type="checkbox" {{if .Backend.Enabled}}checked{{end}}> Enabled</label>
  <div class="form-action">
    <button type="submit">Save changes</button>
    <a class="button secondary" href="/backends">Cancel</a>
  </div>
</form>
</section>
{{end}}
