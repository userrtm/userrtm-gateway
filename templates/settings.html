{{define "content"}}
<h1>Settings</h1>
<section class="panel">
<form method="post" action="/settings" class="stack">
  <fieldset>
    <legend>Gateway mode</legend>
    <label class="radio"><input type="radio" name="mode" value="ip" {{if eq .Settings.Mode "ip"}}checked{{end}}> IP mode — HTTP on port 80, no domain required</label>
    <label class="radio"><input type="radio" name="mode" value="domain" {{if eq .Settings.Mode "domain"}}checked{{end}}> Domain mode — HTTPS on port 443 with Let's Encrypt</label>
  </fieldset>
  <div class="form-grid">
    <label>Gateway domain<input name="domain" value="{{.Settings.Domain}}" placeholder="gateway.example.com"></label>
    <label>Let's Encrypt email<input name="email" value="{{.Settings.Email}}" type="email" placeholder="admin@example.com"></label>
  </div>
  <div><button type="submit">Save settings</button></div>
</form>
</section>

<section class="panel">
<h2>Nginx configuration</h2>
<p>Preview first. Apply creates a backup, validates the new configuration and reloads Nginx.</p>
<div class="actions">
  <a class="button secondary" href="/nginx/preview">Preview</a>
  <form method="post" action="/nginx/apply" data-confirm="Apply generated Nginx configuration?"><button type="submit">Apply configuration</button></form>
  <form method="post" action="/nginx/rollback" data-confirm="Restore latest backup?"><button class="secondary" type="submit">Rollback</button></form>
</div>
</section>
{{end}}
